name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config libcurl4-openssl-dev clang-format

      - name: Lint
        run: make lint

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DOPEN_METEO_BUILD_TESTS=ON -DOPEN_METEO_BUILD_EXAMPLES=ON
          cmake --build build -j$(nproc)

      - name: Test
        run: |
          cd build && ctest --output-on-failure

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          brew install pkg-config curl clang-format

      - name: Lint
        run: make lint

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DOPEN_METEO_BUILD_TESTS=ON -DOPEN_METEO_BUILD_EXAMPLES=ON
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Test
        run: |
          cd build && ctest --output-on-failure

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (vcpkg)
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT/vcpkg.exe" install `
            openssl:x64-windows curl:x64-windows
          "VCPKG_TARGET_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build
        shell: pwsh
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DOPEN_METEO_BUILD_TESTS=ON `
            -DOPEN_METEO_BUILD_EXAMPLES=ON `
            "-DCMAKE_TOOLCHAIN_FILE=$env:CMAKE_TOOLCHAIN_FILE" `
            "-DVCPKG_TARGET_TRIPLET=$env:VCPKG_TARGET_TRIPLET"
          cmake --build build --config Release -j

      - name: Test
        shell: pwsh
        run: ctest --test-dir build --output-on-failure -C Release

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
