name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config libcurl4-openssl-dev

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DOPEN_METEO_BUILD_TESTS=ON -DOPEN_METEO_BUILD_EXAMPLES=ON
          cmake --build build -j$(nproc)

      - name: Test
        run: |
          cd build && ctest --output-on-failure

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DOPEN_METEO_BUILD_TESTS=ON -DOPEN_METEO_BUILD_EXAMPLES=ON
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Test
        run: |
          cd build && ctest --output-on-failure
